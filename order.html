<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Παραγγελία εισιτηρίου κινηματογράφου</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 { text-align: center; }
        label { display: block; margin-bottom: 8px; }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #5cb85c;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover { background-color: #4cae4c; }
    </style>
</head>

<body>
<div class="container">
    <h1>Παραγγείλετε εισιτήρια κινηματογράφου</h1>

    <form action="https://hook.eu2.make.com/uu8bghtw5ce6hr1dchhb3wc5c2f3dsx5" method="POST">

        <label>Ονοματεπώνυμο</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Αριθμός τηλεφώνου</label>
        <input type="text" name="phone">

        <!-- MOVIE SELECT -->
        <label>Ταινία</label>
        <select id="movie" name="movie" required onchange="setPoster()">
            <option value="">Επιλέξτε μια ταινία</option>

            <option 
              value="23-06-26 | Minecraft"
              data-poster="https://upload.wikimedia.org/wikipedia/el/b/bf/Minecraft_movie.webp">
              23-06-26 | Μια Ταινία Minecraft
            </option>

            <option 
              value="30-06-26 | Ραλφ εναντίον ίντερνετ"
              data-poster="https://upload.wikimedia.org/wikipedia/el/e/e7/Ralph_Breaks_the_Internet.png">
              30-06-26 | Ραλφ εναντίον ίντερνετ
            </option>

        </select>

        <!-- THIS GETS SENT TO MAKE -->
        <input type="hidden" name="poster_url" id="poster_url">

        <label>Ώρα</label>
        <select name="time" required>
            <option value="9:00 PM">9:00μμ</option>
        </select>

        <label>Αριθμός Εισιτηρίων</label>
        <input type="number" name="tickets" min="1" max="10" required>

        <button type="submit">Παραγγελία εισιτηρίων</button>
    </form>

    <form action="index.html">
        <button>ΠΗΓΑΙΝΕ ΠΙΣΩ</button>
    </form>
</div>

<script>
function setPoster() {
    const select = document.getElementById("movie");
    const selected = select.options[select.selectedIndex];

    const poster = selected.getAttribute("data-poster");

    document.getElementById("poster_url").value = poster;
}
</script>

</body>
</html>
