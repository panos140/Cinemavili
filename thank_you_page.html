<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo-section">
      <img src="logo.png" alt="Logo" class="logo">
      <h1>Support Us</h1>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="btn">Home</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="main-section">
    <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Thank You! 💚</h2>
    <p style="font-size: 1.2rem; max-width: 600px; margin: 0 auto 2rem;">
      Your donation means a lot to us. Thanks to your support, we can continue improving and making a difference.
    </p>

    <div style="background: white; padding: 2rem; border-radius: 15px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
      <h3 style="margin-bottom: 1rem; color: #00b894;">We Appreciate You!</h3>
      <p>Your generosity helps us grow and serve better every day.</p>
    </div>

    <div style="margin-top: 2rem;">
      <a href="index.html" class="btn" style="background:#00b894; color:white; padding:0.7rem 1.5rem; border-radius:30px; text-decoration:none; font-weight:600;">
        Back to Home
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Thank you for your support ❤️</p>
    <a href="#" class="footer-link">Contact Us</a>
  </footer>

</body>
</html>
